repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: .venv/bin/ruff check .
        language: system
        pass_filenames: false
      - id: ruff-format-check
        name: ruff format check
        entry: .venv/bin/ruff format --check .
        language: system
        pass_filenames: false
      - id: helper-tests
        name: helper tests
        entry: .venv/bin/python framework.py run --helpers --no-open-report --no-generate-report
        language: system
        pass_filenames: false
