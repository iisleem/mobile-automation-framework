repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check .
        language: system
        pass_filenames: false
      - id: helper-tests
        name: helper tests
        entry: python framework.py run --helpers --no-open-report --no-generate-report
        language: system
        pass_filenames: false
