    <text x="96" y="206" font-size="20" font-weight="700" fill="#146b35">Python 3.11</text>
    <text x="96" y="244" font-size="16" fill="#172033">compileall</text>
    <text x="96" y="276" font-size="16" fill="#172033">ruff check</text>
    <text x="96" y="308" font-size="16" fill="#172033">32 helper tests</text>
    <text x="96" y="340" font-size="16" fill="#172033">artifacts uploaded</text>
    <text x="96" y="376" font-size="22" font-weight="700" fill="#16833f">PASSED</text>
    <rect x="354" y="164" width="250" height="236" rx="8" fill="#eef7f1" stroke="#b7dfc4"/>
    <text x="378" y="206" font-size="20" font-weight="700" fill="#146b35">Python 3.12</text>
    <text x="378" y="244" font-size="16" fill="#172033">compileall</text>
    <text x="378" y="276" font-size="16" fill="#172033">ruff check</text>
    <text x="378" y="308" font-size="16" fill="#172033">32 helper tests</text>
    <text x="378" y="340" font-size="16" fill="#172033">artifacts uploaded</text>
    <text x="378" y="376" font-size="22" font-weight="700" fill="#16833f">PASSED</text>
    <rect x="636" y="164" width="250" height="236" rx="8" fill="#eef7f1" stroke="#b7dfc4"/>
    <text x="660" y="206" font-size="20" font-weight="700" fill="#146b35">Python 3.13</text>
