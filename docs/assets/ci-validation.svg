<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Mobile Framework Validation workflow preview</title>
  <desc id="desc">A preview of the CI workflow with Python matrix jobs, static checks, helper tests, and uploaded artifacts.</desc>
  <rect width="960" height="520" fill="#f6f7f9"/>
  <rect x="40" y="36" width="880" height="448" rx="10" fill="#ffffff" stroke="#d8dee8"/>
  <text x="72" y="88" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#172033">Mobile Framework Validation</text>
  <text x="72" y="120" font-family="Arial, sans-serif" font-size="16" fill="#536071">push, pull_request, workflow_dispatch</text>
  <g font-family="Arial, sans-serif">
