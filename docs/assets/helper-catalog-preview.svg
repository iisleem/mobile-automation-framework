<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Helper catalog preview</title>
  <desc id="desc">A preview of the mobile helper catalog with helper categories and descriptions.</desc>
  <rect width="960" height="520" fill="#f6f7f9"/>
  <rect x="42" y="38" width="876" height="444" rx="10" fill="#ffffff" stroke="#d8dee8"/>
  <text x="76" y="90" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#172033">Mobile Framework Helpers Catalog</text>
  <rect x="76" y="124" width="808" height="42" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="98" y="151" font-family="Arial, sans-serif" font-size="16" fill="#536071">Search helpers: gestures, contexts, permissions, deep links, API, visual...</text>
  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="76" y="202" width="808" height="38" fill="#eef2f7"/>
    <text x="96" y="226" font-weight="700" fill="#172033">Helper</text>
    <text x="350" y="226" font-weight="700" fill="#172033">Category</text>
    <text x="520" y="226" font-weight="700" fill="#172033">Description</text>
    <text x="96" y="276" fill="#172033">ContextHelper.switch_to_webview</text>
    <text x="350" y="276" fill="#1457a8">Contexts</text>
    <text x="520" y="276" fill="#536071">Switch native apps into WEBVIEW/CHROMIUM contexts.</text>
    <line x1="76" y1="300" x2="884" y2="300" stroke="#e5e7eb"/>
    <text x="96" y="334" fill="#172033">GestureHelper.swipe</text>
    <text x="350" y="334" fill="#1457a8">Gestures</text>
    <text x="520" y="334" fill="#536071">Cross-platform touch gestures with Appium fallbacks.</text>
    <line x1="76" y1="358" x2="884" y2="358" stroke="#e5e7eb"/>
    <text x="96" y="392" fill="#172033">BaseScreen.type_text</text>
    <text x="350" y="392" fill="#1457a8">Screen Actions</text>
    <text x="520" y="392" fill="#536071">Retries and verifies mobile text entry before continuing.</text>
    <line x1="76" y1="416" x2="884" y2="416" stroke="#e5e7eb"/>
    <text x="96" y="450" fill="#172033">DeepLinkHelper.open_android_deep_link</text>
    <text x="350" y="450" fill="#1457a8">Deep Links</text>
    <text x="520" y="450" fill="#536071">Opens app routes through Appium mobile commands.</text>
  </g>
</svg>
