[pytest]
testpaths = tests
pythonpath = .
addopts =
    -ra
    --strict-markers
    --alluredir=reports/allure-results
    --clean-alluredir
markers =
    smoke: critical mobile smoke tests for fast confidence
    regression: broader mobile feature coverage
    e2e: end-to-end user journeys
    android: Android-only tests
    ios: iOS-only tests
    native: native app automation tests
    hybrid: hybrid app automation tests
    mobile_web: mobile browser automation through Appium profiles
    helpers: unit-style tests for reusable framework helpers
    device: tests that require a real device or simulator
    flaky: test can be retried with pytest-rerunfailures
    reporting_demo: intentionally failing test used to demonstrate artifacts
log_cli = true
log_cli_level = INFO
