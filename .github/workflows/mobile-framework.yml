name: Mobile Framework Validation

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  helper-tests:
    name: Helpers and static checks (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run static checks
        run: |
          python -m compileall -q framework.py conftest.py screens flows utils scripts tests
          ruff check .

      - name: Run helper tests
        run: python framework.py run --helpers --no-open-report

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mobile-framework-artifacts-python-${{ matrix.python-version }}
          path: |
            reports
            screenshots
            source_dumps
            recordings
            logs
          if-no-files-found: warn
